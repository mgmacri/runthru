name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=INSTAPAPER_CONSUMER_KEY="${{ secrets.INSTAPAPER_CONSUMER_KEY }}" \
            --dart-define=INSTAPAPER_CONSUMER_SECRET="${{ secrets.INSTAPAPER_CONSUMER_SECRET }}"
