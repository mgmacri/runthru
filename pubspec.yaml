# Audit dependencies quarterly. Remove any package with zero imports in lib/.
name: runthru
description: "RunThru — Paced reading for focus. Your attention isn't broken, it just needs a better direction."
publish_to: 'none'
version: 2.0.0+15

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  pdfrx: ^2.2.24
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  file_picker: ^8.1.6
  permission_handler: ^11.3.1
  device_info_plus: ^11.1.0
  window_manager: ^0.4.3
  crypto: ^3.0.3
  fl_chart: ^0.69.0
  http: ^1.2.1
  xml: ^6.5.0
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: BricolageGrotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque-400.ttf
          weight: 400
        - asset: assets/fonts/BricolageGrotesque-500.ttf
          weight: 500
        - asset: assets/fonts/BricolageGrotesque-600.ttf
          weight: 600
        - asset: assets/fonts/BricolageGrotesque-700.ttf
          weight: 700
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf
        - asset: assets/fonts/Satoshi-VariableItalic.ttf
          style: italic
