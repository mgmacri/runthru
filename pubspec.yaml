name: speedy_boy
description: "Speedy Boy — Cross-platform speed reading app with 3D neumorphic cube viewport."
publish_to: 'none'
version: 2.0.0+8

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  syncfusion_flutter_pdf: ^27.2.5
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  file_picker: ^8.1.6
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.2
  window_manager: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: BricolageGrotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque-400.ttf
          weight: 400
        - asset: assets/fonts/BricolageGrotesque-500.ttf
          weight: 500
        - asset: assets/fonts/BricolageGrotesque-600.ttf
          weight: 600
        - asset: assets/fonts/BricolageGrotesque-700.ttf
          weight: 700
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf
        - asset: assets/fonts/Satoshi-VariableItalic.ttf
          style: italic
