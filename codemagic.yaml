workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      groups:
        - instapaper_credentials  # Codemagic env group: INSTAPAPER_CONSUMER_KEY, INSTAPAPER_CONSUMER_SECRET
        - google_signin_credentials  # Codemagic env group: GOOGLE_IOS_CLIENT_ID (iOS OAuth client), GOOGLE_WEB_CLIENT_ID (Web OAuth client for Android serverClientId)
    scripts:
      # CFBundleVersion must strictly increase for App Store Connect.
      # Never rely on the +N in pubspec.yaml being manually bumped.
      - name: Auto-increment build number
        script: |
          BUILD_NUM=$((${PROJECT_BUILD_NUMBER:-8} + 1))
          echo "Setting build number to $BUILD_NUM"
          sed -i.bak "s/^version: .*/version: 2.0.0+${BUILD_NUM}/" pubspec.yaml
          cat pubspec.yaml | grep "^version:"
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.mgmacri.runthru" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create
          keychain initialize
          keychain add-certificates
      - name: Run tests
        script: flutter test
      - name: Build iOS (no codesign — let Flutter migrate)
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=INSTAPAPER_CONSUMER_KEY="$INSTAPAPER_CONSUMER_KEY" \
            --dart-define=INSTAPAPER_CONSUMER_SECRET="$INSTAPAPER_CONSUMER_SECRET" \
            --dart-define=GOOGLE_IOS_CLIENT_ID="$GOOGLE_IOS_CLIENT_ID" \
      - name: Apply signing profiles (after Flutter migration)
        script: |
          xcode-project use-profiles
      - name: Archive and sign IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
      - name: Validate build number
        script: |
          IPA_PATH=$(find build/ios/ipa -name '*.ipa' | head -1)
          if [ -z "$IPA_PATH" ]; then echo "ERROR: No IPA found"; exit 1; fi
          BUNDLE_VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" \
            <(unzip -p "$IPA_PATH" Payload/*.app/Info.plist))
          echo "CFBundleVersion in IPA: $BUNDLE_VER"
          if [ "$BUNDLE_VER" -le 8 ]; then
            echo "ERROR: CFBundleVersion ($BUNDLE_VER) must be > 8"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
  android-play-store:
    name: Android Play Store Internal
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 21
      android_signing:
        - runthru_upload_keystore
      vars:
        PACKAGE_NAME: com.runthru.app
      groups:
        - instapaper_credentials  # Codemagic env group: INSTAPAPER_CONSUMER_KEY, INSTAPAPER_CONSUMER_SECRET
        - google_signin_credentials  # Codemagic env group: GOOGLE_WEB_CLIENT_ID (Web OAuth client for Android serverClientId)
        - google_play_credentials # GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Write Android signing properties
        script: |
          test -n "$CM_KEYSTORE_PATH"
          test -n "$CM_KEYSTORE_PASSWORD"
          test -n "$CM_KEY_ALIAS"
          test -n "$CM_KEY_PASSWORD"
          cat > android/key.properties <<EOF
          storeFile=$CM_KEYSTORE_PATH
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Run tests
        script: flutter test
      - name: Build Android App Bundle
        script: |
          flutter build appbundle \
            --release \
            --dart-define=INSTAPAPER_CONSUMER_KEY="$INSTAPAPER_CONSUMER_KEY" \
            --dart-define=INSTAPAPER_CONSUMER_SECRET="$INSTAPAPER_CONSUMER_SECRET" \
            --dart-define=GOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID"
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/logs/*.log
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
