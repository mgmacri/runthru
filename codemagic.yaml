workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.mgmacri.speedyboy" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create
          keychain initialize
          keychain add-certificates
      - name: Run tests
        script: flutter test
      - name: Build iOS (no codesign — let Flutter migrate)
        script: |
          flutter build ios \
            --release \
            --no-codesign
      - name: Apply signing profiles (after Flutter migration)
        script: |
          xcode-project use-profiles
      - name: Archive and sign IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
