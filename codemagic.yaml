workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mgmacri.speedyboy
    scripts:
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "com.mgmacri.speedyboy" \
            --type IOS_APP_STORE \
            --create
          app-store-connect fetch-signing-files "com.mgmacri.speedyboy" \
            --type IOS_APP_DEVELOPMENT \
            --create
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Set up CocoaPods
        script: |
          cd ios && pod install
      - name: Get Flutter packages
        script: flutter pub get
      - name: Run tests
        script: flutter test
      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
